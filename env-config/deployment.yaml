apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-dashboard
  template:
    metadata:
      labels:
        app: bank-dashboard
    spec:
      containers:
      - name: app
        image: asia-south1-docker.pkg.dev/bank-dashboard-project-493816/bank-repo/bank-dashboard:latest
        ports:
        - containerPort: 8080