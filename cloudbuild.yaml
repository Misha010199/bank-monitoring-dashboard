steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # Create build info directory if it doesn't exist
        mkdir -p app-code

        # Write Git and Build info
        echo $SHORT_SHA > app-code/git_sha.txt
        echo "$(date '+%Y-%m-%d %H:%M:%S PKT')" > app-code/build_time.txt

        # Write detailed build info
        cat > app-code/build_details.txt << EOF
        BUILD_ID: $BUILD_ID
        TRIGGER_NAME: $TRIGGER_NAME
        BUILD_STATUS: SUCCESS
        BRANCH_NAME: $BRANCH_NAME
        REPO_NAME: $REPO_NAME
        COMMIT_SHA: $COMMIT_SHA
        SHORT_SHA: $SHORT_SHA
        PROJECT_ID: $PROJECT_ID
        LOCATION: $LOCATION
        BUILD_START_TIME: $(date '+%Y-%m-%d %H:%M:%S PKT')
        EOF

        echo "✅ Build info injected for commit: $SHORT_SHA"
        cat app-code/build_details.txt

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:$SHORT_SHA",
        "-t",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:latest",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:$SHORT_SHA",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:latest",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud container clusters get-credentials bank-cluster --region asia-south1 --project $PROJECT_ID
        kubectl apply -f env-config/deployment.yaml
        kubectl apply -f env-config/service.yaml
        kubectl rollout restart deployment/bank-dashboard
        kubectl rollout status deployment/bank-dashboard

options:
  logging: CLOUD_LOGGING_ONLY
