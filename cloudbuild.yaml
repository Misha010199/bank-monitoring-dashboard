steps:
 
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e

        mkdir -p app-code

        # fallback tag (works for manual + trigger builds)
        TAG=${SHORT_SHA:-manual-$(date +%s)}

        # correct PKT time
        BUILD_TIME=$(TZ="Asia/Karachi" date '+%Y-%m-%d %H:%M:%S %Z')

        echo "$TAG" > app-code/git_sha.txt
        echo "$BUILD_TIME" > app-code/build_time.txt

        cat > app-code/build_details.txt <<EOF
BUILD_ID: $BUILD_ID
TRIGGER_NAME: $TRIGGER_NAME
BUILD_STATUS: SUCCESS
BRANCH_NAME: $BRANCH_NAME
REPO_NAME: $REPO_NAME
COMMIT_SHA: $COMMIT_SHA
SHORT_SHA: $TAG
PROJECT_ID: $PROJECT_ID
LOCATION: $LOCATION
BUILD_TIME: $BUILD_TIME
EOF

        echo "Build info written"


  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        TAG=${SHORT_SHA:-manual-$(date +%s)}

        docker build \
          -t asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:$TAG \
          -t asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:latest \
          .


  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        TAG=${SHORT_SHA:-manual-$(date +%s)}

        docker push asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:$TAG


  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/bank-repo/bank-dashboard:latest",
      ]


  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e

        gcloud container clusters get-credentials bank-cluster \
          --region asia-south1 \
          --project $PROJECT_ID

        kubectl apply -f env-config/deployment.yaml
        kubectl apply -f env-config/service.yaml

        kubectl rollout restart deployment/bank-dashboard
        kubectl rollout status deployment/bank-dashboard

   
        DEPLOY_TIME=$(TZ="Asia/Karachi" date '+%Y-%m-%d %H:%M:%S %Z')
        echo "$DEPLOY_TIME" > app-code/deploy_time.txt

        echo "Deployment completed at: $DEPLOY_TIME"

options:
  logging: CLOUD_LOGGING_ONLY